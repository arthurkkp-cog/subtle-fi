name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test -- --ci --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  build:
    name: Build
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_APPWRITE_ENDPOINT: https://cloud.appwrite.io/v1
      NEXT_PUBLIC_APPWRITE_PROJECT: placeholder
      APPWRITE_DATABASE_ID: placeholder
      APPWRITE_USER_COLLECTION_ID: placeholder
      APPWRITE_BANK_COLLECTION_ID: placeholder
      APPWRITE_TRANSACTION_COLLECTION_ID: placeholder
      NEXT_APPWRITE_KEY: placeholder
      PLAID_CLIENT_ID: placeholder
      PLAID_SECRET: placeholder
      PLAID_ENV: sandbox
      PLAID_PRODUCTS: auth
      PLAID_COUNTRY_CODES: US
      DWOLLA_KEY: placeholder
      DWOLLA_SECRET: placeholder
      DWOLLA_BASE_URL: https://api-sandbox.dwolla.com
      DWOLLA_ENV: sandbox
      SENTRY_AUTH_TOKEN: placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
